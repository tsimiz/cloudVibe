<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cloud Island POC</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: linear-gradient(to top, #a0d8ef, #ffffff);
      touch-action: none;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const player = {
      x: 100,
      y: 100,
      vx: 0,
      vy: 0,
      width: 32,
      height: 32,
      grounded: false
    };

    const gravity = 0.5;
    const moveSpeed = 3;
    const jumpForce = -10;

    // Camera system for scrolling
    const camera = { x: 0, y: 0 };

    const platforms = [
      { x: 0, y: height - 60, width: 2500, height: 60 }, // Extended ground platform
      { x: 100, y: height - 150, width: 120, height: 20 },
      { x: 300, y: height - 200, width: 80, height: 20 },
      { x: 500, y: height - 120, width: 100, height: 20 },
      { x: 700, y: height - 180, width: 90, height: 20 },
      { x: 900, y: height - 250, width: 110, height: 20 },
      { x: 1100, y: height - 140, width: 80, height: 20 },
      { x: 1300, y: height - 220, width: 120, height: 20 },
      { x: 1500, y: height - 160, width: 100, height: 20 },
      { x: 1700, y: height - 300, width: 90, height: 20 },
      { x: 1900, y: height - 180, width: 110, height: 20 },
    ];

    let keys = { left: false, right: false, up: false };

    // Keyboard controls
    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
      e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
      if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
      e.preventDefault();
    });

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      if (touch.clientX < width / 3) keys.left = true;
      else if (touch.clientX > (2 * width) / 3) keys.right = true;
      else keys.up = true;
    });
    canvas.addEventListener('touchend', () => {
      keys = { left: false, right: false, up: false };
    });

    function update() {
      if (keys.left) player.vx = -moveSpeed;
      else if (keys.right) player.vx = moveSpeed;
      else player.vx = 0;

      if (keys.up && player.grounded) {
        player.vy = jumpForce;
        player.grounded = false;
      }

      player.vy += gravity;
      player.x += player.vx;
      player.y += player.vy;

      // Update camera to follow player (smooth scrolling)
      const targetCameraX = player.x - width / 2;
      camera.x += (targetCameraX - camera.x) * 0.1; // Smooth camera movement

      // Basic collision with platforms
      player.grounded = false;
      for (const p of platforms) {
        if (
          player.x < p.x + p.width &&
          player.x + player.width > p.x &&
          player.y < p.y + p.height &&
          player.y + player.height > p.y
        ) {
          if (player.vy > 0) {
            player.y = p.y - player.height;
            player.vy = 0;
            player.grounded = true;
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Background sky gradient (already handled via CSS)

      // Save the context state
      ctx.save();
      
      // Apply camera transform
      ctx.translate(-camera.x, -camera.y);

      // Draw platforms
      ctx.fillStyle = '#8ED6FF';
      for (const p of platforms) {
        // Only draw platforms that are visible on screen
        if (p.x + p.width > camera.x && p.x < camera.x + width) {
          ctx.fillRect(p.x, p.y, p.width, p.height);
        }
      }

      // Draw player
      ctx.fillStyle = '#FF8C8C';
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Restore the context state
      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
